<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Hub — ResumeRise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col justify-center items-center p-6">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-slate-100/80 border border-slate-100 p-8">
        
        <div class="text-center mb-8">
            <span class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">wollo</span>
            <h2 id="authTitle" class="text-xl font-bold tracking-tight text-slate-950 mt-2">Welcome Back</h2>
            <p id="authSubtitle" class="text-xs text-slate-400 mt-1">Access your optimized student trajectory workspace</p>
        </div>

        <button id="googleAuthBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 transition font-semibold text-xs text-slate-700 py-3.5 rounded-xl shadow-sm">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 2.47 2.18 5.38l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </button>

        <div class="relative flex items-center py-6">
            <div class="flex-grow border-t border-slate-200"></div>
            <span class="flex-shrink mx-3 text-slate-400 text-[10px] font-bold uppercase tracking-widest">or email parameters</span>
            <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-wider mb-1.5">Email Address</label>
                <input type="email" id="email" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 text-xs transition" placeholder="name@domain.com" required>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-wider mb-1.5">Password</label>
                <input type="password" id="password" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 text-xs transition" placeholder="••••••••" required>
            </div>

            <div id="statusMessage" class="hidden text-xs font-medium text-center p-3 rounded-xl"></div>

            <button type="submit" id="submitFormBtn" class="w-full bg-slate-950 hover:bg-slate-900 text-white font-bold text-xs uppercase tracking-wider py-4 rounded-xl transition duration-200 shadow-md">
                Sign In
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-slate-100">
            <p class="text-xs text-slate-500">
                <span id="toggleContext">Don't have an account?</span>
                <button id="toggleModeBtn" class="text-indigo-600 font-semibold ml-1 hover:underline focus:outline-none">Sign Up</button>
            </p>
        </div>

    </div>

    <script>
        const supabaseUrl = "{{ supabase_url }}";
        const supabaseKey = "{{ supabase_key }}";
        let isLoginMode = true;

        // FIXED: Exclusively call the globally verified library instance window parameter
        const sbClient = (supabaseUrl && supabaseKey) ? supabase.createClient(supabaseUrl, supabaseKey) : null;

        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const submitFormBtn = document.getElementById('submitFormBtn');
        const toggleContext = document.getElementById('toggleContext');
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        const authForm = document.getElementById('authForm');
        const statusMessage = document.getElementById('statusMessage');
        const googleAuthBtn = document.getElementById('googleAuthBtn');

        toggleModeBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.innerText = "Welcome Back";
                authSubtitle.innerText = "Access your optimized student trajectory workspace";
                submitFormBtn.innerText = "Sign In";
                toggleContext.innerText = "Don't have an account?";
                toggleModeBtn.innerText = "Sign Up";
            } else {
                authTitle.innerText = "Create Account";
                authSubtitle.innerText = "Begin your comprehensive platform optimization evaluation";
                submitFormBtn.innerText = "Create Account";
                toggleContext.innerText = "Already registered?";
                toggleModeBtn.innerText = "Sign In";
            }
            statusMessage.classList.add('hidden');
        });

        if (googleAuthBtn) {
            googleAuthBtn.addEventListener('click', async () => {
                if (!sbClient) {
                    alert("Supabase integration credentials are unassigned.");
                    return;
                }
                const currentOrigin = window.location.origin;
                await sbClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: `${currentOrigin}/auth/callback`
                    }
                });
            });
        }

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            statusMessage.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-indigo-50', 'text-indigo-600');
            statusMessage.className = "text-xs font-medium text-center p-3 rounded-xl bg-slate-100 text-slate-600 animate-pulse";
            statusMessage.innerText = "Processing transactional metrics...";

            const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/signup';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    statusMessage.className = "text-xs font-medium text-center p-3 rounded-xl bg-emerald-50 text-emerald-600";
                    statusMessage.innerText = result.message + " Redirecting dashboard...";
                    setTimeout(() => window.location.href = '/', 1000);
                } else if (result.status === 'not_found') {
                    statusMessage.className = "text-xs font-medium text-center p-3 rounded-xl bg-indigo-50 text-indigo-600";
                    statusMessage.innerText = result.message;
                    setTimeout(() => {
                        if (isLoginMode) toggleModeBtn.click();
                        statusMessage.classList.add('hidden');
                    }, 2000);
                } else {
                    // FIXED: Resolved broken styling layout tokens
                    statusMessage.className = "text-xs font-medium text-center p-3 rounded-xl bg-red-50 text-red-600";
                    statusMessage.innerText = `Error: ${result.message}`;
                }
            } catch (err) {
                statusMessage.className = "text-xs font-medium text-center p-3 rounded-xl bg-red-50 text-red-600";
                statusMessage.innerText = "Network data handling error.";
            }
        });
    </script>
</body>
</html>
