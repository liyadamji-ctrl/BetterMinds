<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronizing Authentication State</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col justify-center items-center font-sans p-6">

    <div class="text-center max-w-sm">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mx-auto mb-4"></div>
        <h3 class="text-sm font-bold text-slate-950">Synchronizing Session Parameters</h3>
        <p class="text-xs text-slate-400 mt-1 leading-relaxed">Securing authorization certificates and finalizing user token routing data configurations...</p>
    </div>

    <script>
        const supabaseUrl = "{{ supabase_url }}";
        const supabaseKey = "{{ supabase_key }}";

        if (supabaseUrl && supabaseKey) {
            // FIXED: Exclusively call the globally verified library instance window parameter
            const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

            async function processSessionSync() {
                const { data: { session }, error } = await sbClient.auth.getSession();
                
                if (session && session.user) {
                    try {
                        const response = await fetch('/api/auth/set_session', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user: {
                                    id: session.user.id,
                                    email: session.user.email
                                }
                            })
                        });

                        if (response.ok) {
                            window.location.href = '/';
                            return;
                        }
                    } catch (e) {
                        console.error("Session verification routing mismatch:", e);
                    }
                }
                
                setTimeout(() => {
                    window.location.href = '/auth';
                }, 1500);
            }

            processSessionSync();
        } else {
            window.location.href = '/auth';
        }
    </script>
</body>
</html>
